<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/codebridge.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <section class="heading">
            <header>
                <div class="logo">
                    <img src="assets/codebridge.png">
                </div>
                <nav>
                    <h1 id="home">
                        <a href="index.html">Início</a>
                    </h1>
                    <h1 id="about">
                        <a href="about.html">Sobre</a>
                    </h1>
                    <h1 id="products">
                        <a href="products.html">Produtos</a>
                    </h1>
                    <h1 id="login">
                        <a href="login.html">Login</a>
                    </h1>
                </nav>
            </header>
        </section>
    <main class="main-content">
        <section class="body">
            <header>
                <img src="assets/software.jpg">
            </header>
            <article>
                <h2><b>O futuro do seu negócio começa com o código certo.<b></h2>
                <p>Entre em contato com um dos nossos consultores!</p>
            </article>
            <form>
                <label>
                    <p>Preencha com seus dados:</p>
                    <div class="icon">
                        <i class="fa-solid fa-user"></i>
                        <input id="name-input" type="text" placeholder="Nome" name="name-input">
                    </div>
                    <div class="icon">
                        <i class="fa-solid fa-at"></i>
                        <input id="email-input" type="text" placeholder="E-mail" name="email-input">
                    </div>
                    <div class="icon">
                        <i class="fa-solid fa-phone"></i>
                        <input id="phonenumber" type="text" placeholder="Telefone" name="phonenumber">
                    </div>
                    <button>Enviar</button>
                </label>
            </form>
        </section>
    </main>
     <section class="footing">
            <footer>
                <div class="bar">
                    <div class="inner">
                        <div class="icons">
                             <a href="#">
                                <img src="assets/facebook_icon.png">
                                <img src="assets/instagram_icon.png">
                                <img src="assets/twitter_icon.png">
                            </a>
                        </div>
                        <div class="follow-us">
                            <p>Conecte-se!</p>
                        </div>
                    </div>
                    <div class="contact">
                        <address>
                            <p>São Paulo/SP Brasil - CEP 01000-000</p>
                            <p>E-mail: contato@codebridge.com.br</p>
                            <p>Telefone: (11) 99999-9999</p>
                        </address>
                    </div>
                </div>
                <div class="copyright">
                    <p>© 2026 CodeBridge. Todos os direitos reservados.</p>
                </div>
            </footer>
        </section>
</body>
</html>
